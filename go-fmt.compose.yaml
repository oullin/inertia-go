services:
    go-fmt:
        image: ghcr.io/oullin/go-fmt:v0.0.17
        working_dir: /work
        volumes:
            - .:/work
        environment:
            HOST_PROJECT_PATH: ${PWD}
        command:
            - format
            - --host-path
            - ${PWD}/core
            - --host-path
            - ${PWD}/demo/api
